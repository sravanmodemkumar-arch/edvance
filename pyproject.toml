[tool.uv.workspace]
members = ["api", "portal", "shared"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "httpx>=0.27",
    "ruff>=0.5",
    "mypy>=1.10",
    "pre-commit>=3.7",
]

# ─── Ruff — replaces flake8 + black + isort ──────────────────────────────────
[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["migrations", ".venv", "venv", "__pycache__", ".git"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # bandit (security)
    "RUF", # ruff-specific
]
ignore = [
    "S101", # allow assert in tests
    "B008", # allow function calls in defaults (FastAPI Depends)
]

[tool.ruff.lint.per-file-ignores]
"test_*.py" = ["S", "B"]   # relax security/bugbear in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ─── mypy ────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
exclude = ["migrations/", "tests/"]

# ─── pytest ──────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["api", "portal"]
python_files = "test_*.py"
python_functions = "test_*"
