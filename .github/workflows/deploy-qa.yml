name: Deploy → QA

on:
  push:
    branches: [qa]

env:
  AWS_REGION: ap-south-1
  ENVIRONMENT: qa

jobs:
  deploy-lambda-qa:
    name: Deploy ${{ matrix.service }} → Lambda (qa)
    runs-on: ubuntu-latest
    environment: qa

    strategy:
      fail-fast: false
      matrix:
        service: [identity, exam, notification, billing, ai, analytics]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Run full test suite with coverage
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt pytest pytest-asyncio httpx pytest-cov
          pytest --cov=app --cov-report=xml --cov-fail-under=75 -v
        env:
          APP_ENV: qa
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY_QA }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_QA }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}-qa

      - name: SAM deploy to QA
        run: |
          sam build --template ${{ matrix.service }}/template.yaml
          sam deploy \
            --stack-name edvance-qa-${{ matrix.service }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DatabaseUrl=${{ secrets.DATABASE_URL_QA }} \
              JwtSecretKey=${{ secrets.JWT_SECRET_KEY_QA }} \
              AppEnv=qa

  deploy-portal-qa:
    name: Deploy portal → Fargate (qa)
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push portal image (qa)
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/edvance-portal:qa-${{ github.sha }}
          docker build -t $IMAGE_URI ./portal
          docker push $IMAGE_URI

      - name: Update ECS QA service
        run: |
          aws ecs update-service \
            --cluster edvance-qa \
            --service edvance-portal-qa \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  qa-regression:
    name: QA Regression Tests
    runs-on: ubuntu-latest
    needs: [deploy-lambda-qa, deploy-portal-qa]
    environment: qa

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (Playwright)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Playwright regression suite
        run: |
          if [ -d e2e ]; then
            cd e2e && npm ci && npx playwright install --with-deps
            npx playwright test --reporter=html
          else
            echo "No E2E tests yet — skipping"
          fi
        env:
          BASE_URL: ${{ secrets.QA_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-qa
          path: e2e/playwright-report/
