name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  line-limit:
    name: Enforce 100-line file limit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check all files ≤ 100 lines
        run: python scripts/check_line_count.py .

  lint-and-test:
    name: Lint & Test (${{ matrix.service }} / Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        service: [identity, exam, notification, billing, ai, analytics]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 black pytest pytest-cov pytest-asyncio httpx

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,.venv,migrations

      - name: Format check (black)
        run: black --check . --line-length=120

      - name: Run tests
        run: pytest --cov=app --cov-report=xml -v
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/edvance_test
          JWT_SECRET_KEY: test-secret-key
          APP_ENV: testing

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edvance_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  lint-portal:
    name: Lint & Test (portal / Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: portal

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: portal/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 black pytest pytest-django pytest-cov

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,.venv,migrations

      - name: Format check (black)
        run: black --check . --line-length=120

      - name: Run tests
        run: pytest --cov=. --cov-report=xml -v
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/edvance_test
          SECRET_KEY: test-django-secret-key
          DEBUG: "true"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edvance_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
