name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ── 100-line limit ──────────────────────────────────────────────────────────
  line-limit:
    name: Enforce 100-line file limit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_line_count.py .

  # ── Lint + Format (ruff) ────────────────────────────────────────────────────
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  # ── API Tests ───────────────────────────────────────────────────────────────
  test-api:
    name: Test API (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edvance_test
          POSTGRES_USER: edvance
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev --frozen
      - name: Run API tests
        run: uv run pytest api/ -v --cov=api --cov-report=xml
        env:
          DATABASE_URL: postgresql://edvance:testpass@localhost:5432/edvance_test
          JWT_SECRET_KEY: test-secret-key-32-chars-minimum
          APP_ENV: testing
          INFRA_PROVIDER: cloudflare

  # ── Portal Tests ────────────────────────────────────────────────────────────
  test-portal:
    name: Test Portal (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edvance_test
          POSTGRES_USER: edvance
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev --frozen
      - name: Run Portal tests
        run: uv run pytest portal/ -v --cov=portal --cov-report=xml
        env:
          DATABASE_URL: postgresql://edvance:testpass@localhost:5432/edvance_test
          SECRET_KEY: test-django-secret-key
          DEBUG: "true"
          DJANGO_SETTINGS_MODULE: portal.core.settings.dev
