name: Deploy → Staging

on:
  push:
    branches: [staging]

env:
  AWS_REGION: ap-south-1
  ENVIRONMENT: staging

jobs:
  deploy-lambda-staging:
    name: Deploy ${{ matrix.service }} → Lambda (staging)
    runs-on: ubuntu-latest
    environment: staging

    strategy:
      fail-fast: false
      matrix:
        service: [identity, exam, notification, billing, ai, analytics]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Run full test suite
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt pytest pytest-asyncio httpx pytest-cov
          pytest -x -q --cov=app --cov-fail-under=70
        env:
          APP_ENV: staging
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY_STAGING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: SAM deploy to staging
        run: |
          sam build --template ${{ matrix.service }}/template.yaml
          sam deploy \
            --stack-name edvance-staging-${{ matrix.service }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DatabaseUrl=${{ secrets.DATABASE_URL_STAGING }} \
              JwtSecretKey=${{ secrets.JWT_SECRET_KEY_STAGING }} \
              AppEnv=staging

  deploy-portal-staging:
    name: Deploy portal → Fargate (staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push portal image (staging)
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/edvance-portal:staging-${{ github.sha }}
          docker build -t $IMAGE_URI ./portal
          docker push $IMAGE_URI

      - name: Update ECS staging service
        run: |
          aws ecs update-service \
            --cluster edvance-staging \
            --service edvance-portal-staging \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster edvance-staging \
            --services edvance-portal-staging \
            --region ${{ env.AWS_REGION }}

  e2e-tests:
    name: E2E Tests on Staging
    runs-on: ubuntu-latest
    needs: [deploy-lambda-staging, deploy-portal-staging]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (Playwright)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          if [ -d e2e ]; then
            cd e2e && npm ci && npx playwright install --with-deps
          fi

      - name: Run E2E tests
        run: |
          if [ -d e2e ]; then
            cd e2e && npx playwright test
          else
            echo "No E2E tests yet — skipping"
          fi
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
