name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This issue has been inactive for 30 days. It will be closed in 7 days if there is no activity."
          stale-pr-message: "This PR has been inactive for 14 days. It will be closed in 7 days if there is no activity."
          close-issue-message: "Closed due to inactivity. Reopen if still relevant."
          close-pr-message: "Closed due to inactivity. Reopen if still relevant."
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
