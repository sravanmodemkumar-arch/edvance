name: Bug Report
description: Report a bug
title: "[BUG] "
labels: ["bug"]

body:
  - type: dropdown
    id: service
    attributes:
      label: Service
      options: [identity, portal, exam, notification, billing, ai, analytics]
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options: [dev, staging, production]
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What was expected?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
