{% comment %}
Reusable alert/notification component.
Usage: {% include "components/alert.html" with type="success" message="Saved!" %}
{% endcomment %}
{% if message %}
<div class="rounded-md p-4 mb-4
  {% if type == 'success' %}bg-green-50 border border-green-200{% endif %}
  {% if type == 'error' %}bg-red-50 border border-red-200{% endif %}
  {% if type == 'warning' %}bg-yellow-50 border border-yellow-200{% endif %}
  {% if type == 'info' %}bg-blue-50 border border-blue-200{% endif %}">
  <p class="text-sm
    {% if type == 'success' %}text-green-800{% endif %}
    {% if type == 'error' %}text-red-800{% endif %}
    {% if type == 'warning' %}text-yellow-800{% endif %}
    {% if type == 'info' %}text-blue-800{% endif %}">
    {{ message }}
  </p>
</div>
{% endif %}
