# Phase 1 VPS deployment — all services on one machine
# Also used for local development.
# Phase 2+: API → Lambda, Portal → ECS (use infra/aws/template.yaml).

services:
  # ── FastAPI (Monolith — 57 modules) ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file: env/.env.cloudflare
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Django Portal (11 groups) ─────────────────────────────────────────────
  portal:
    build:
      context: .
      dockerfile: infra/docker/portal.Dockerfile
    ports:
      - "8080:8080"
    env_file: env/.env.cloudflare
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker (PostgreSQL broker — Phase 1 only) ─────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: uv run celery -A api.core.celery_app.celery_app worker -l info -c 4
    env_file: env/.env.cloudflare
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (cron scheduler — Phase 1) ────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: uv run celery -A api.core.celery_app.celery_app beat -l info
    env_file: env/.env.cloudflare
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (local dev + Phase 1 prod) ────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edvance
      POSTGRES_USER: edvance
      POSTGRES_PASSWORD: localpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edvance"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── CF Tunnel (Phase 1 production — expose VPS via CF) ───────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: [production]
    command: tunnel run edvance-tunnel
    volumes:
      - ~/.cloudflared:/home/nonroot/.cloudflared:ro
    restart: unless-stopped

volumes:
  pgdata:
