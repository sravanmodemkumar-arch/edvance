repos:
  # ─── 100-line limit ────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check-line-count
        name: "Enforce 100-line file limit"
        entry: python scripts/check_line_count.py
        language: python
        pass_filenames: false
        always_run: true

  # ─── Python formatting ────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: [--line-length=100]

  # ─── Python linting ───────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --exclude=migrations]

  # ─── Import sorting ───────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  # ─── Secret scanning ──────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ─── Trailing whitespace / EOF ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: debug-statements
