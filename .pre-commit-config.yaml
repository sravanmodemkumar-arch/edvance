repos:
  # ── 100-line file limit ────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check-line-count
        name: "Enforce 100-line file limit"
        entry: python scripts/check_line_count.py
        language: python
        pass_filenames: false
        always_run: true

  # ── Ruff — lint + format (replaces flake8 + black + isort) ───────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Secret scanning ────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: debug-statements
      - id: check-added-large-files
        args: [--maxkb=500]
